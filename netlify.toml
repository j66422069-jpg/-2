[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["better-sqlite3", "lightningcss", "vite", "@tailwindcss/vite", "@vitejs/plugin-react"]
  included_files = ["portfolio.db"]

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--force"
  CI = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
